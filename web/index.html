<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ExpenseSort — sort, split & save</title>
<style>
  :root{
    --bg:#f4f7f6; --card:#ffffff; --ink:#0e2c28; --muted:#6c827b; --line:#e6efeb;
    --teal:#0f766e; --teald:#0b5148; --teal2:#12b3a6; --mint:#7fe7d4; --mintbg:#e7f7f1;
    --green:#12a150; --red:#e5484d; --amber:#e08c1a; --peach:#fbe6da; --ink2:#0c2320;
    --grad:linear-gradient(135deg,#0f766e 0%,#0b5148 100%);
    --grad2:linear-gradient(135deg,#12b3a6 0%,#0f766e 70%);
    --shadow:0 16px 40px rgba(6,60,54,.12); --shadow-sm:0 4px 16px rgba(6,60,54,.07);
    --r:20px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:"Inter","Segoe UI",system-ui,-apple-system,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;}
  body.dark{--bg:#0c1c1a;--card:#122b28;--ink:#eaf5f2;--muted:#8fa9a2;--line:#1e3a35;--shadow:0 16px 40px rgba(0,0,0,.4);--shadow-sm:0 4px 16px rgba(0,0,0,.3);}
  a{color:var(--teal);text-decoration:none;}
  .hidden{display:none!important;}
  .num{font-variant-numeric:tabular-nums;}

  /* buttons */
  .btn{background:var(--grad);color:#fff;border:0;border-radius:14px;padding:13px 22px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 10px 22px rgba(15,118,110,.28);display:inline-flex;align-items:center;gap:8px;justify-content:center;}
  .btn:hover{filter:brightness(1.06);} .btn:disabled{opacity:.5;box-shadow:none;cursor:default;}
  .btn.sm{padding:9px 15px;font-size:13px;border-radius:11px;box-shadow:none;}
  .btn.mint{background:var(--mint);color:var(--teald);box-shadow:none;}
  .btn.dark{background:var(--ink2);color:#fff;box-shadow:none;}
  .btn.ghost{background:transparent;color:var(--teal);border:1.5px solid var(--line);box-shadow:none;}
  .btn.outline{background:#fff;color:var(--teal);border:1.5px solid var(--teal2);box-shadow:none;}
  .link{background:none;border:0;color:var(--teal);font-weight:700;cursor:pointer;font-size:13.5px;padding:2px;}
  .link:hover{text-decoration:underline;}
  .fab{position:fixed;right:26px;bottom:26px;width:58px;height:58px;border-radius:50%;background:var(--grad2);color:#fff;font-size:28px;border:0;cursor:pointer;box-shadow:0 12px 28px rgba(15,118,110,.4);z-index:20;}

  /* inputs */
  input,select,textarea{font-family:inherit;font-size:14px;border:0;border-bottom:1.5px solid var(--line);border-radius:0;padding:11px 2px;background:transparent;color:var(--ink);width:100%;}
  .boxed input,.boxed select,input.box,select.box,textarea{border:1.5px solid var(--line);border-radius:12px;padding:12px 14px;background:var(--card);}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--teal2);}
  textarea{resize:vertical;font-family:ui-monospace,Consolas,monospace;min-height:110px;}
  label.fld{display:block;font-size:12px;font-weight:700;color:var(--muted);margin:16px 0 4px;letter-spacing:.2px;}
  .eye{position:absolute;right:4px;top:34px;cursor:pointer;color:var(--muted);background:none;border:0;font-size:16px;}

  /* toggle switch */
  .sw{width:46px;height:26px;border-radius:20px;background:#cdd8d4;position:relative;cursor:pointer;transition:.2s;flex:none;}
  .sw.on{background:var(--teal);} .sw:after{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s;}
  .sw.on:after{left:23px;}
  /* segmented */
  .seg{display:inline-flex;background:var(--mintbg);border-radius:11px;padding:4px;gap:2px;}
  .seg button{border:0;background:none;padding:7px 14px;border-radius:8px;font-weight:700;font-size:12.5px;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:5px;}
  .seg button.on{background:#fff;color:var(--teal);box-shadow:var(--shadow-sm);}

  /* pills */
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;padding:4px 10px;border-radius:20px;letter-spacing:.3px;}
  .pill.sub{background:var(--mint);color:var(--teald);} .pill.rec{background:var(--peach);color:#a24e12;}
  .pill.ok{background:#e6f7ee;color:var(--green);} .pill.warn{background:#fdf0dd;color:var(--amber);} .pill.over{background:#fdeaea;color:var(--red);}
  .pill.g{background:var(--mintbg);color:var(--teal);}
  .chip{background:var(--mintbg);border-radius:10px;padding:8px 12px;} .chip .k{font-size:10.5px;color:var(--muted);text-transform:uppercase;font-weight:700;letter-spacing:.4px;} .chip .v{font-weight:800;font-size:15px;}

  /* auth */
  .authwrap{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;}
  @media(max-width:820px){.authwrap{grid-template-columns:1fr;} .authhero{display:none;}}
  .authhero{background:var(--grad);color:#fff;padding:46px;display:flex;flex-direction:column;position:relative;overflow:hidden;}
  .authhero:after{content:"";position:absolute;right:-80px;bottom:80px;width:300px;height:300px;border-radius:50%;background:rgba(255,255,255,.06);}
  .authhero h1{font-size:44px;line-height:1.12;font-weight:800;margin-top:auto;max-width:520px;}
  .authhero p{opacity:.9;margin-top:18px;max-width:440px;font-size:15px;}
  .heros{display:flex;gap:40px;margin-top:34px;} .heros .n{font-size:30px;font-weight:800;} .heros .l{font-size:11px;letter-spacing:1px;opacity:.8;text-transform:uppercase;}
  .authform{display:flex;align-items:center;justify-content:center;padding:40px 32px;}
  .authcard{width:100%;max-width:420px;}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:22px;}
  .brand.wh{color:#fff;} .logo{width:34px;height:34px;border-radius:9px;background:#fff;color:var(--teal);display:grid;place-items:center;font-weight:900;font-size:18px;}
  .brand.wh .logo{background:rgba(255,255,255,.15);color:#fff;}
  .divider{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:11px;letter-spacing:1px;margin:22px 0;} .divider:before,.divider:after{content:"";height:1px;background:var(--line);flex:1;}
  .oauth{display:flex;gap:12px;} .oauth button{flex:1;border:1.5px solid var(--line);background:#fff;border-radius:12px;padding:11px;font-weight:700;font-size:13.5px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--ink);}
  .err{color:var(--red);font-size:12.5px;min-height:16px;margin-top:8px;}
  .tabsauth{display:flex;gap:8px;margin:16px 0;}
  .tabsauth button{flex:1;padding:9px;border-radius:10px;border:1.5px solid var(--line);background:#fff;font-weight:700;cursor:pointer;color:var(--muted);}
  .tabsauth button.on{background:var(--mintbg);color:var(--teal);border-color:var(--teal2);}

  /* onboarding */
  .obwrap{min-height:100vh;background:var(--grad);display:grid;place-items:center;padding:20px;color:#fff;}
  .obcard{width:100%;max-width:440px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);border-radius:26px;padding:32px;backdrop-filter:blur(8px);}
  .obcard input{color:#fff;border-color:rgba(255,255,255,.3);}
  .obcard input::placeholder{color:rgba(255,255,255,.55);}
  .obprog{height:6px;background:rgba(255,255,255,.2);border-radius:6px;margin:12px 0 26px;overflow:hidden;} .obprog>div{height:100%;background:var(--mint);border-radius:6px;transition:.3s;}
  .obtop{display:flex;justify-content:space-between;font-size:11px;letter-spacing:1px;text-transform:uppercase;opacity:.85;}
  .obavatar{width:96px;height:96px;border-radius:50%;border:2px dashed rgba(255,255,255,.5);display:grid;place-items:center;margin:8px auto 22px;font-size:30px;}

  /* app shell */
  header.top{background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:15;}
  .topin{max-width:1180px;margin:0 auto;display:flex;align-items:center;gap:20px;padding:14px 22px;}
  .nav{display:flex;gap:2px;margin:0 auto;flex-wrap:wrap;}
  .nav button{background:none;border:0;padding:8px 13px;border-radius:9px;font-weight:600;font-size:14px;color:var(--muted);cursor:pointer;position:relative;}
  .nav button.on{color:var(--teal);font-weight:800;}
  .nav button.on:after{content:"";position:absolute;left:13px;right:13px;bottom:-15px;height:3px;background:var(--teal);border-radius:3px;}
  .iconbtn{background:none;border:0;cursor:pointer;color:var(--muted);font-size:18px;display:grid;place-items:center;width:36px;height:36px;border-radius:9px;}
  .iconbtn:hover{background:var(--mintbg);}
  .avatar{width:38px;height:38px;border-radius:50%;background:var(--teal);color:#fff;display:grid;place-items:center;font-weight:800;font-size:14px;cursor:pointer;overflow:hidden;flex:none;}
  .avatar img{width:100%;height:100%;object-fit:cover;}
  main{max-width:1180px;margin:24px auto 40px;padding:0 22px;}
  footer{max-width:1180px;margin:0 auto;padding:22px;border-top:1px solid var(--line);display:flex;justify-content:space-between;color:var(--muted);font-size:12.5px;flex-wrap:wrap;gap:10px;}
  footer .fl{display:flex;gap:20px;}

  h2.page{font-size:26px;font-weight:800;} .eyebrow{font-size:12px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--teal);}
  .sub{color:var(--muted);font-size:14px;margin:2px 0 18px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:22px;box-shadow:var(--shadow-sm);}
  .gradcard{background:var(--grad);color:#fff;border-radius:var(--r);padding:24px;box-shadow:var(--shadow);}
  .gradcard.mint{background:var(--grad2);}
  h3{font-size:12px;text-transform:uppercase;letter-spacing:.6px;margin:0 0 14px;color:var(--muted);font-weight:800;}
  .cardtitle{font-size:19px;font-weight:800;margin-bottom:2px;}
  .grid{display:grid;gap:18px;} .g3{grid-template-columns:repeat(3,1fr);} .g2{grid-template-columns:1fr 1fr;}
  .dash{display:grid;grid-template-columns:1.6fr 1fr;gap:18px;}
  @media(max-width:860px){.g3,.g2,.dash{grid-template-columns:1fr;}}

  .kpi{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:var(--shadow-sm);border-left:5px solid var(--teal);display:flex;gap:14px;align-items:center;}
  .kpi.in{border-left-color:var(--green);} .kpi.out{border-left-color:var(--red);}
  .kpi .badge{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;font-size:20px;flex:none;background:var(--mintbg);}
  .kpi.in .badge{background:#e6f7ee;} .kpi.out .badge{background:#fdeaea;}
  .kpi .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:800;}
  .kpi .val{font-size:26px;font-weight:800;margin-top:2px;}

  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{text-align:left;padding:12px 10px;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--line);font-weight:800;}
  td{padding:14px 10px;border-bottom:1px solid var(--line);}
  th.r,td.r{text-align:right;font-variant-numeric:tabular-nums;}
  tbody tr:hover{background:rgba(18,179,166,.04);}
  .bar{height:10px;border-radius:6px;background:var(--line);overflow:hidden;} .bar>div{height:100%;border-radius:6px;background:var(--teal);}
  .tdot{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:7px;vertical-align:middle;}
  .listrow{display:flex;align-items:center;gap:14px;padding:15px 4px;border-bottom:1px solid var(--line);}
  .listrow:last-child{border-bottom:0;}
  .micon{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;font-size:20px;flex:none;background:var(--mintbg);}
  .alert{display:flex;align-items:center;gap:12px;border-left:4px solid var(--amber);background:#fdf8ee;padding:14px 16px;border-radius:12px;margin-bottom:12px;font-size:13.5px;}
  .alert.dup{border-color:var(--red);background:#fef6f6;} .alert.peach{border:0;background:var(--peach);}
  .coachlist{list-style:none;} .coachlist li{display:flex;gap:10px;align-items:center;margin:11px 0;font-size:14px;}
  .check{width:20px;height:20px;border-radius:6px;border:1.5px solid rgba(255,255,255,.6);flex:none;}
  .muted{color:var(--muted);} .fs13{font-size:13px;} .mt{margin-top:16px;} .mb{margin-bottom:16px;}
  .rowb{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;}
  .grouprow{display:flex;align-items:center;gap:12px;padding:13px;border-radius:13px;cursor:pointer;border:1px solid transparent;}
  .grouprow.on,.grouprow:hover{background:var(--mintbg);border-color:var(--teal2);}
  .settlecard{border:1px solid var(--line);border-radius:14px;padding:15px;display:flex;align-items:center;gap:13px;margin-bottom:12px;}
  .subnav button{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:none;border:0;padding:12px 14px;border-radius:12px;font-weight:600;font-size:14px;color:var(--muted);cursor:pointer;}
  .subnav button.on{background:var(--mintbg);color:var(--teal);font-weight:800;border-left:3px solid var(--teal);}
  .donutwrap{display:grid;place-items:center;position:relative;}
  .dropzone{border:2px dashed var(--line);border-radius:var(--r);padding:34px;text-align:center;background:var(--card);}
  .dropzone.drag{border-color:var(--teal2);background:var(--mintbg);}
  .avatarsm{width:30px;height:30px;border-radius:50%;background:var(--teal);color:#fff;display:grid;place-items:center;font-size:12px;font-weight:700;border:2px solid #fff;}
  .stack{display:flex;} .stack .avatarsm:not(:first-child){margin-left:-8px;}

  .modal{position:fixed;inset:0;background:rgba(6,44,40,.5);display:grid;place-items:center;z-index:50;padding:16px;}
  .modal .card{max-width:460px;width:100%;max-height:90vh;overflow:auto;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink2);color:#fff;padding:12px 20px;border-radius:12px;font-size:13.5px;z-index:100;box-shadow:var(--shadow);}
</style></head>
<body>
  <div id="auth" class="hidden"></div>
  <div id="onboard" class="hidden"></div>
  <div id="app" class="hidden">
    <header class="top"><div class="topin">
      <div class="brand"><span class="logo">₹</span> ExpenseSort</div>
      <nav class="nav" id="nav"></nav>
      <button class="iconbtn" onclick="go('settings')" title="Settings">⚙️</button>
      <div class="avatar" id="avatar" onclick="go('settings')"></div>
    </div></header>
    <main id="view"></main>
    <footer>
      <span><b>₹ ExpenseSort</b> &middot; © 2026 Built with precision for India.</span>
      <span class="fl"><a href="#">Security</a><a href="#">Privacy</a><a href="#">Support</a><a href="#">API</a></span>
    </footer>
  </div>
  <div id="modal"></div>
  <script src="/app.js"></script>
</body></html>
